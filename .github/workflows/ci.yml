name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API service dependencies
        run: pip install -r requirements.txt

      - name: Install auth service dependencies
        run: pip install -r auth_service/requirements.txt

      - name: Install test & lint tools
        run: pip install pytest httpx ruff

      - name: Lint with ruff
        run: ruff check . --select E,F,W --ignore E501

      - name: Run all tests
        env:
          GOOGLE_API_KEY: dummy-key-for-tests
          JWT_SECRET_KEY: test-secret-key-for-ci
        run: python -m pytest tests/ -v --tb=short
